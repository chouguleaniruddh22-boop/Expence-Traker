<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>Expense Tracker System</h1>

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>
    </header>

    <!-- Summary Cards -->

    <div class="summary">

        <div class="card balance">

            <h2>Total Balance</h2>

            <h1>₹ <span id="balance">0</span></h1>

        </div>

        <div class="card income">

            <h2>Total Income</h2>

            <h1>₹ <span id="income">0</span></h1>

        </div>

        <div class="card expense">

            <h2>Total Expense</h2>

            <h1>₹ <span id="expense">0</span></h1>

        </div>

    </div>

    <!-- Add Transaction -->

    <div class="transaction-form">

        <h2>Add Transaction</h2>

        <input type="text"
               id="title"
               placeholder="Transaction Title">

        <input type="number"
               id="amount"
               placeholder="Amount">

        <select id="type">

            <option value="Income">Income</option>

            <option value="Expense">Expense</option>

        </select>

        <button onclick="addTransaction()">

            Add Transaction

        </button>

    </div>

    <!-- Transaction History -->

    <div class="history">

        <h2>Transaction History</h2>

        <table>

            <thead>

            <tr>

                <th>Title</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Action</th>

            </tr>

            </thead>

            <tbody id="historyTable">

            </tbody>

        </table>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
